version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - misspell
    - nilerr
    - staticcheck
    - unused

  settings:
    errcheck:
      exclude-functions:
        - io.Close
        - (io.Closer).Close
        - (*os.File).Close
        - (net/http.ResponseWriter).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    gocritic:
      disabled-checks:
        # ifElseChain only fires on heterogeneous-condition chains here (each
        # branch tests a different expression, not one value) where an
        # equivalent `switch {}` reads no better; not worth the churn.
        - ifElseChain
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

      # Style suggestions, not errors.
      - linters: [staticcheck]
        text: "ST1023"
      - linters: [staticcheck]
        text: "QF"

formatters:
  enable:
    - gofmt
    - goimports
