# CircleCI SETUP config — dynamic config entry point.
#
# This file is the setup pipeline for circleci-org-migration-cli.
# It uses the path-filtering orb to decide which downstream workflows fire:
#
#   - Changes to orb/**  → sets run-orb-publish=true in continue_config.yml,
#                          which gates the orb-publish workflow dev-publish job.
#   - A version tag push → the tag filter below ensures this setup runs on tags,
#                          so the production orb-publish + release workflows fire.
#   - Everything else   → only the ci workflow runs (unchanged behaviour).
#
# All jobs/workflows (ci, release, orb-publish) live in continue_config.yml.
version: 2.1
setup: true

orbs:
  path-filtering: circleci/path-filtering@1

workflows:
  setup:
    jobs:
      - path-filtering/filter:
          base-revision: main
          config-path: .circleci/continue_config.yml
          mapping: |
            orb/.* run-orb-publish true
          filters:
            tags:
              only: /.*/
