# CircleCI CONTINUATION config — all workflows live here.
#
# This file is invoked by the setup pipeline (.circleci/config.yml) via the
# path-filtering orb. The pipeline parameter run-orb-publish is set to true
# by path-filtering when any file under orb/ changes; it gates the dev orb
# publish job. The production publish job is gated by version-tag filter only.
#
# Workflow summary:
#   ci          — fail-fast DAG: build+lint+coverage → test+security → e2e
#   release     — goreleaser (tag-only, unchanged)
#   orb-publish — dev publish (branch, orb changed) + prod publish (tag-only)
#
# Prerequisites:
#   Context "orb-publishing" must exist in the awesomecicd org containing:
#     CIRCLE_TOKEN — an org-owner-scoped CircleCI personal API token
#
# One-time orb creation (run once by an org owner before the first publish):
#   circleci orb create awesomecicd/circleci-org-migration \
#     --private \
#     --org-id efc130dc-284f-4533-964e-844f5c173860
#
# CircleCI pipeline for circleci-migrate.
#
# Best practices applied (per CircleCI docs):
#   - reusable executor + reusable commands (DRY)
#   - the official circleci/go orb for module download + caching
#   - convenience image (cimg/go) instead of bespoke images
#   - a matrix job for cross-platform builds (GOOS x GOARCH)
#   - JUnit test results (gotestsum) + coverage artifacts
#   - dedicated security stage (govulncheck, gosec, gitleaks, trivy)
#
# Workflow stages (DAG) — fail-fast:
#   Wave A — build matrix, lint, coverage (parallel, no prerequisites):
#             Build: linux/amd64, Build: linux/arm64,
#             Build: darwin/amd64, Build: darwin/arm64,
#             Lint, Coverage (85% gate)
#   Wave B — test + security (require ALL of Wave A):
#             Unit Tests (race), Security: govulncheck, Security: gosec (SAST),
#             Security: gitleaks, Security: Trivy
#   Wave C — e2e (requires ALL of Wave B, uses binary persisted by build):
#             E2E Smoke (built binary)
version: 2.1

parameters:
  # Set to true by path-filtering when any file under orb/ changes.
  # Gates the dev orb-publish job (branches only).
  run-orb-publish:
    type: boolean
    default: false
  go-image-tag:
    type: string
    # cimg/go floating patch tag. circleci-migrate targets Go 1.26 (see go.mod).
    default: "1.26"

orbs:
  go: circleci/go@3.0.4
  trivy: cci-labs/trivy@1.0.0
  # Orb authoring toolchain — used by the orb-test jobs to lint, validate, and
  # review the orb BEFORE it is published. Pinned to majors per the task.
  orb-tools: circleci/orb-tools@12.4.0
  shellcheck: circleci/shellcheck@3.4.0

# ---------------------------------------------------------------------------
# Executors
# Resource-class sizing is workload-reasoned; tune with CircleCI usage data:
#   medium  — lint/test/coverage/sast/vuln: golangci-lint v2 + race detector
#             need the extra RAM; medium is the minimum safe class.
#   small   — build matrix + binary-download jobs: mostly curl + go build,
#             light on RAM; small cuts credit cost noticeably at this width.
# ---------------------------------------------------------------------------
executors:
  go:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-image-tag >>
    resource_class: medium
    environment:
      CGO_ENABLED: "0"
  # gosec's SSA/type analysis is memory-hungry and grew past medium's 4GB as the
  # module's dependency graph expanded (e.g. lipgloss, x/term), causing the
  # security-sast scan to thrash/OOM and stall past the 10m no-output limit.
  # Give the SAST job 8GB so the scan completes in seconds again.
  go-large:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-image-tag >>
    resource_class: large
    environment:
      CGO_ENABLED: "0"
  base:
    docker:
      - image: cimg/base:current
    resource_class: small

commands:
  goinstall:
    description: "go install a pinned tool and make it available on PATH."
    parameters:
      pkg:
        type: string
    steps:
      - run:
          name: "Install << parameters.pkg >>"
          command: go install << parameters.pkg >>

jobs:
  # ===========================================================================
  # WAVE A — Lint (run in parallel with build matrix + coverage, no prerequisites)
  # ===========================================================================

  lint:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: go vet
          command: go vet ./...
      - run:
          name: gofmt check
          command: |
            unformatted=$(gofmt -l .)
            if [ -n "$unformatted" ]; then
              echo "These files are not gofmt-clean:"
              echo "$unformatted"
              exit 1
            fi
      # Install golangci-lint via `go install` at a pinned version instead of
      # piping the installer fetched from the floating HEAD ref. This removes a
      # supply-chain risk (the install.sh could change under us) while keeping
      # the exact same pinned tool version.
      # renovate: datasource=github-releases depName=golangci/golangci-lint
      - goinstall:
          pkg: github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - run:
          name: golangci-lint
          command: golangci-lint run --timeout 5m
      - run:
          name: docs-check (stale docs gate)
          command: |
            # Build the binary and regenerate docs; fail if any file changed.
            go build -o bin/circleci-migrate .
            ./bin/circleci-migrate gen-docs --man-dir man --md-dir docs/cli
            if ! git diff --exit-code -- man/ docs/cli/ > /dev/null 2>&1; then
              echo ""
              echo "ERROR: Generated docs are out of date."
              echo "Run 'make docs && make man' locally and commit the result."
              echo ""
              git diff --stat -- man/ docs/cli/
              exit 1
            fi
            echo "docs-check: OK (no diff)"
      - run:
          name: doc-flags-check (hand-written docs staleness gate)
          command: |
            # Fail if a released flag in the generated docs/cli/ reference is
            # not mentioned in the hand-written docs/guide.md walkthrough.
            # Guards against the v0.5-v0.7 doc drift the audit flagged (H3/D2).
            ./scripts/check-doc-flags.sh docs/cli docs/guide.md
      - run:
          name: skill-commands-check (skills/ staleness gate)
          command: |
            # Fail if a circleci-migrate subcommand or flag referenced in any
            # skills/**/*.md is absent from the generated docs/cli/ reference.
            # Guards against deprecated flags or renamed subcommands silently
            # persisting in the AI skills (closes #221).
            ./scripts/check-skill-commands.sh skills docs/cli

  # ===========================================================================
  # WAVE A — Coverage (run in parallel with build matrix + lint, no prerequisites)
  # ===========================================================================

  coverage:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: Run full test suite with coverage
          command: |
            # Single container — collect coverage across all packages at once.
            # Do NOT split here; partial per-container profiles cannot be easily
            # merged and would give a misleading total.
            CGO_ENABLED=1 go test -covermode=atomic -coverprofile=coverage.out ./...
      - run:
          name: Coverage report + threshold gate
          command: |
            go tool cover -html=coverage.out -o coverage.html
            go tool cover -func=coverage.out | tail -1
            ./scripts/check-coverage.sh coverage.out
      - store_artifacts:
          path: coverage.html
          destination: coverage.html

  # ===========================================================================
  # WAVE B — Security scanners (require ALL of Wave A)
  # ===========================================================================

  security-vuln:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      # govulncheck uses call-graph analysis: it fails only on vulnerabilities
      # in code paths we actually call. Pin the scanner binary for a reproducible
      # security gate (the vulnerability DB is still fetched fresh at run time, so
      # pinning the binary does not staleness the findings). Renovate bumps this.
      # renovate: datasource=github-releases depName=golang/vuln
      - goinstall:
          pkg: golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - run:
          name: govulncheck
          command: govulncheck ./...

  security-sast:
    # gosec needs >4GB on the current dependency graph; run on the 8GB executor.
    executor: go-large
    steps:
      - checkout
      - go/mod-download-cached
      # Cache the gosec binary across runs — keyed on version + arch so a new
      # version or a different executor arch triggers a fresh download.
      - restore_cache:
          keys:
            - gosec-v2.27.1-{{ arch }}-v2
      - run:
          name: Install gosec (if not cached)
          command: |
            if [ ! -x /usr/local/bin/gosec ]; then
              # renovate: datasource=github-releases depName=securego/gosec
              ver=v2.27.1
              url="https://github.com/securego/gosec/releases/download/${ver}/gosec_${ver#v}_linux_amd64.tar.gz"
              # --connect-timeout/--max-time bound each attempt so a network stall
              # fails fast (and the retry loop actually fires) instead of hanging
              # the job. Download to a file first so a partial transfer never feeds tar.
              for attempt in 1 2 3; do
                if curl -fsSL --connect-timeout 20 --max-time 120 -o /tmp/gosec.tgz "$url"; then
                  sudo tar -xz -C /usr/local/bin -f /tmp/gosec.tgz gosec && break
                fi
                echo "Attempt ${attempt} failed; retrying in 5s..." && sleep 5
              done
              gosec --version
            fi
      - save_cache:
          key: gosec-v2.27.1-{{ arch }}-v2
          paths:
            - /usr/local/bin/gosec
      - run:
          name: gosec (SAST)
          # Safety net: don't let a transient slow scan trip the 10m no-output
          # default. With the 8GB executor the scan completes in well under this.
          no_output_timeout: 20m
          command: |
            mkdir -p test-results
            status=0
            gosec -severity high -fmt junit-xml -out test-results/gosec.xml ./... || status=$?
            gosec -severity high -fmt sarif -out gosec.sarif ./... 2>/dev/null || true
            exit $status
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: gosec.sarif
          destination: gosec.sarif

  security-secrets:
    executor: base
    steps:
      - checkout
      # Cache the gitleaks binary keyed on version + arch.
      - restore_cache:
          keys:
            - gitleaks-v8.30.1-{{ arch }}-v1
      - run:
          name: Install gitleaks (if not cached)
          command: |
            if ! command -v gitleaks &>/dev/null; then
              ver=8.30.1
              curl -sfL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" \
                | sudo tar -xz -C /usr/local/bin gitleaks
            fi
            gitleaks version
      - save_cache:
          key: gitleaks-v8.30.1-{{ arch }}-v1
          paths:
            - /usr/local/bin/gitleaks
      - run:
          name: gitleaks (secret scan, full history)
          command: |
            gitleaks detect --source=. --redact --exit-code=1 \
              --report-format=sarif --report-path=gitleaks.sarif
      - store_artifacts:
          path: gitleaks.sarif
          destination: gitleaks.sarif

  # Filesystem vuln/secret/misconfig scan via the cci-labs Trivy orb.
  # Blocking: exit-code 1 on any HIGH or CRITICAL finding (clean baseline verified).
  security-trivy:
    executor: base
    steps:
      - checkout
      # Install trivy via a direct, pinned release download. The orb's installer
      # (and trivy's contrib install.sh) resolve the version through the GitHub
      # API, which is rate-limited on shared CI IPs and was failing here. A
      # direct release download (same pattern as the gitleaks job) is reliable.
      - run:
          name: Install Trivy (pinned v0.71.0)
          command: |
            ver=0.71.0
            curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${ver}/trivy_${ver}_Linux-64bit.tar.gz" \
              | sudo tar -xz -C /usr/local/bin trivy
            trivy --version
      - trivy/scan:
          skip-setup-trivy: true
          scan-type: fs
          scan-ref: "."
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
          hide-progress: true

  # ===========================================================================
  # WAVE B — Test (requires ALL of Wave A)
  # ===========================================================================

  test:
    executor: go
    parallelism: 2
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: Run tests (split by timing, race detector)
          command: |
            mkdir -p test-results
            # Split packages across containers by timing data; falls back to
            # name-splitting on the first run (no timing data yet).
            PKGS=$(go list ./... | circleci tests split --split-by=timings --timings-type=classname)
            # -race requires CGO; executor defaults CGO_ENABLED=0 for static
            # builds, so enable it just for the race-enabled test run.
            CGO_ENABLED=1 gotestsum \
              --junitfile test-results/unit-tests.xml \
              --format testname \
              -- -race $PKGS
      - run:
          # Best-effort HTML report from the JUnit XML. cimg/go may or may not
          # have Node available; wrap in || true so a missing runtime never
          # fails the build. The JUnit XML + store_test_results already populate
          # the Tests tab; this is a convenient bonus artifact.
          name: HTML test report (best effort)
          command: |
            npx --yes xunit-viewer --results=test-results --output=test-results/index.html \
              || echo "html report skipped (node/npx not available)"
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

  # ===========================================================================
  # WAVE C — E2E smoke test (requires ALL of Wave B; uses binary from workspace)
  # ===========================================================================

  # E2E binary smoke test — no tokens, no network required.
  # Uses the linux/amd64 binary persisted to workspace by the build matrix job.
  # Exercises CLI entry points + the secrets-extract path against a tiny
  # in-memory fixture manifest.
  # TODO: add a live-org e2e suite (against a dedicated test org with scoped
  #       tokens) once secret management for CI is in place.
  e2e:
    executor: go
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Smoke — version + help
          command: |
            ./bin/linux/amd64/circleci-migrate version
            ./bin/linux/amd64/circleci-migrate --help
            ./bin/linux/amd64/circleci-migrate export --help
      - run:
          name: Smoke — secrets extract (fixture, no network)
          command: |
            # Write a minimal manifest with one context containing one variable.
            # printf (not a heredoc) keeps the CircleCI parameter parser happy.
            mkdir -p e2e-tmp
            printf '%s' '{"schema_version":"1","source":{"host":"https://circleci.com","org":{"slug":"gh/test-org","name":"test-org"}},"contexts":[{"name":"e2e-ctx","environment_variables":[{"name":"E2E_SECRET_VAR"}]}],"projects":[]}' > e2e-tmp/manifest.json
            # Supply the variable value via the environment (as a real job would).
            E2E_SECRET_VAR=supersecret \
              ./bin/linux/amd64/circleci-migrate secrets extract \
                --manifest e2e-tmp/manifest.json \
                --context e2e-ctx \
                --output e2e-tmp/secrets.json
            # Assert the bundle was created and contains the expected key.
            test -f e2e-tmp/secrets.json
            grep -q "E2E_SECRET_VAR" e2e-tmp/secrets.json
            echo "E2E smoke test passed."

  # ===========================================================================
  # WAVE C — Terraform validate (requires ALL of Wave B; uses binary from workspace)
  #
  # Generates Terraform HCL from the fixture manifest and then validates it
  # structurally.
  #
  # terraform init (provider download) requires network access to the Terraform
  # Registry. In the standard CircleCI cloud executor this is available, so the
  # job runs a full init + fmt-check + validate. If the registry is unreachable
  # (e.g. air-gapped runners), only terraform fmt -check runs (still catches HCL
  # syntax errors in the generated files).
  #
  # Terraform is downloaded at a pinned version via a direct GitHub release URL
  # (same pattern as gosec/trivy/gitleaks above, to avoid supply-chain risk).
  # ===========================================================================

  terraform-validate:
    executor: base
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install Terraform (pinned v1.9.8)
          command: |
            # renovate: datasource=github-releases depName=hashicorp/terraform
            ver=1.9.8
            curl -fsSL "https://releases.hashicorp.com/terraform/${ver}/terraform_${ver}_linux_amd64.zip" \
              -o /tmp/terraform.zip
            unzip -o /tmp/terraform.zip -d /tmp/terraform-bin
            sudo install -m 0755 /tmp/terraform-bin/terraform /usr/local/bin/terraform
            terraform version
      - run:
          name: Generate Terraform from fixture manifest
          command: |
            mkdir -p /tmp/tf-validate
            ./bin/linux/amd64/circleci-migrate terraform generate \
              --manifest internal/terraform/testdata/fixture_manifest.json \
              --placeholders \
              --dest-org-id "bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb" \
              --out /tmp/tf-validate
            ls -la /tmp/tf-validate
      - run:
          name: Terraform fmt-check (HCL syntax validation, no network required)
          command: |
            terraform fmt -check -recursive /tmp/tf-validate
            echo "terraform fmt -check: OK"
      - run:
          name: Terraform init + validate (full provider download)
          # Wrapped in || so a network failure does not fail the whole CI run;
          # the fmt-check step above already catches HCL syntax errors.
          # If init succeeds, validate runs and its exit code is propagated.
          command: |
            cd /tmp/tf-validate
            # init downloads the CircleCI provider from the registry.
            # -backend=false skips remote state configuration (not needed for validate).
            if terraform init -backend=false; then
              terraform validate
              echo "terraform validate: OK"
            else
              echo "terraform init failed (network unavailable?); fmt-check already passed"
            fi

  # ===========================================================================
  # WAVE A — Cross-platform build matrix (parallel with lint + coverage)
  # Persists each built binary to workspace for downstream consumers (e2e).
  # ===========================================================================

  build:
    parameters:
      goos:
        type: string
      goarch:
        type: string
    # Build jobs are mostly curl + go build — light on RAM; small saves credits.
    executor: go
    resource_class: small
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: Build << parameters.goos >>/<< parameters.goarch >>
          command: |
            out="bin/<< parameters.goos >>/<< parameters.goarch >>/circleci-migrate"
            mkdir -p "$(dirname "$out")"
            GOOS=<< parameters.goos >> GOARCH=<< parameters.goarch >> \
              go build -trimpath -o "$out" .
            ls -lh "$out"
      - persist_to_workspace:
          root: .
          paths:
            - bin/<< parameters.goos >>/<< parameters.goarch >>/circleci-migrate
      - store_artifacts:
          path: bin/<< parameters.goos >>/<< parameters.goarch >>
          destination: binaries/<< parameters.goos >>/<< parameters.goarch >>

  # ===========================================================================
  # RELEASE-PLEASE — automated release PR + GitHub Release creation
  # ===========================================================================
  #
  # Triggered on every push to main (branch pipelines only, never on tags).
  # release-please inspects the Conventional Commits since the last release and:
  #   1. Opens / updates a "release PR" that bumps the version in
  #      .release-please-manifest.json and updates CHANGELOG.md.
  #   2. When that release PR is merged back to main, cuts the git tag and
  #      creates a bare GitHub Release (no binaries yet).
  # The tag push then fires the tag-triggered `release` and `orb-publish-prod`
  # workflows defined below, which build and attach the binary artifacts.
  #
  # Requires a CircleCI context that exposes GITHUB_TOKEN with:
  #   contents:write      — to push the version-bump commit and create the tag
  #   pull-requests:write — to open / update the release PR
  #
  # We reuse the existing "goreleaser" context here.  If the GITHUB_TOKEN stored
  # in that context has only "repo" scope (classic PAT) it already covers both
  # permissions above.  If it is a fine-grained PAT scoped only to contents:write
  # you will need to add pull-requests:write — see the PR body for details.
  release-please:
    docker:
      - image: cimg/node:lts
    resource_class: small
    steps:
      - run:
          name: release-please release-pr
          command: |
            npx release-please@17.9.0 release-pr \
              --repo-url=AwesomeCICD/circleci-org-migration-cli \
              --config-file=release-please-config.json \
              --manifest-file=.release-please-manifest.json \
              --token="$GITHUB_TOKEN"
      - run:
          name: release-please github-release
          command: |
            npx release-please@17.9.0 github-release \
              --repo-url=AwesomeCICD/circleci-org-migration-cli \
              --config-file=release-please-config.json \
              --manifest-file=.release-please-manifest.json \
              --token="$GITHUB_TOKEN"

  # ===========================================================================
  # RELEASE — publish cross-platform binaries via GoReleaser
  # ===========================================================================

  # Triggered only by version tags (see the release workflow below).
  # Requires a CircleCI context named "goreleaser" that exposes GITHUB_TOKEN
  # with "repo" scope (needed to create GitHub Releases and upload assets).
  release:
    executor: go
    steps:
      - checkout
      # Install GoReleaser at a pinned version — same pattern as gitleaks/trivy
      # above (direct release download, no unpinned orb dependency).
      - run:
          name: Install GoReleaser (pinned v2.9.0)
          command: |
            ver=2.9.0
            curl -sfL "https://github.com/goreleaser/goreleaser/releases/download/v${ver}/goreleaser_Linux_x86_64.tar.gz" \
              | sudo tar -xz -C /usr/local/bin goreleaser
            goreleaser --version
      # cosign + syft are REQUIRED by the .goreleaser.yml `signs:` (keyless
      # artifact signing) and `sboms:` (CycloneDX SBOM) blocks. They are not
      # bundled with GoReleaser, so the release step fails without them on PATH.
      # Installed via direct, pinned release downloads (same pattern as above).
      # cosign install removed: keyless signing is disabled (see #215 and
      # .goreleaser.yml signs: block). syft (SBOM generation) stays.
      - run:
          name: Install syft (pinned v1.18.1)
          command: |
            # renovate: datasource=github-releases depName=anchore/syft
            ver=1.45.1
            curl -sfL "https://github.com/anchore/syft/releases/download/v${ver}/syft_${ver}_linux_amd64.tar.gz" \
              | sudo tar -xz -C /usr/local/bin syft
            syft version
      - go/mod-download-cached
      - run:
          name: goreleaser release
          command: goreleaser release --clean

  # ===========================================================================
  # RELEASE-SMOKE — post-release packaging / install smoke test
  # ===========================================================================
  #
  # Downloads the published GitHub Release tarball for the just-released tag
  # (using CIRCLE_TAG from the tag pipeline context), extracts it, and runs:
  #   1. circleci-migrate version
  #   2. circleci-migrate --help
  #   3. secrets merge against two minimal inline fixture bundles
  #   4. README curl install snippet verbatim (scratch-dir install)
  #
  # Runs linux/amd64 and linux/arm64 in parallel via matrix.
  # Requires the "goreleaser" context so GITHUB_TOKEN is available for the
  # GitHub API call in the README install step (avoids anonymous rate-limit).
  # Triggered only by version tags; runs AFTER the `release` job completes.
  release-smoke:
    parameters:
      platform:
        type: string
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - checkout
      - run:
          name: Smoke — download + test << parameters.platform >> binary
          # Allow up to 10 minutes: the tarball download retry loop can take a
          # few minutes while GoReleaser finishes uploading the assets.
          no_output_timeout: 10m
          command: |
            bash scripts/smoke-release.sh "$CIRCLE_TAG" "<< parameters.platform >>"

  # ===========================================================================
  # ORB PUBLISH — validate + publish awesomecicd/circleci-org-migration
  # ===========================================================================
  #
  # Two flavours of publish, defined as a single parametrised job:
  #   dev   — branches: publishes packed orb as a dev label (SHA-prefixed).
  #   prod  — tags:     publishes packed orb as a semver release.
  #
  # The CircleCI CLI must be available on the executor. cimg/base:current does
  # not ship the CLI, so we install it via the official install script.
  #
  # The orb source lives in orb/src/ (Orb Development Kit layout). Before any
  # publish or validate step we pack the source into a single YAML file:
  #   circleci orb pack orb/src > /tmp/orb.yml
  #
  # Context "orb-publishing" must contain:
  #   CIRCLE_TOKEN — personal API token for an org owner of awesomecicd
  #
  # One-time setup (run once by an org owner):
  #   circleci orb create awesomecicd/circleci-org-migration \
  #     --private \
  #     --org-id efc130dc-284f-4533-964e-844f5c173860
  # ===========================================================================
  # ORB TEST — pack + validate the orb (gates publish)
  # ===========================================================================
  #
  # Our own pack + validate job (mirrors the pack/validate steps in publish-orb
  # and the local `make orb-validate` target). Kept separate from publish so a
  # validation failure prevents publishing. The orb-tools/lint and
  # shellcheck/check jobs (see the orb-publish workflows) cover style + script
  # linting; this job is the authoritative "does the packed orb validate against
  # the private namespace" gate.
  orb-validate:
    executor: base
    steps:
      - checkout
      - run:
          name: Install CircleCI CLI (pinned v0.1.34950)
          command: |
            # Pin BOTH the installer script (to a commit SHA, not the floating
            # `main` ref) and the CLI version it installs (via VERSION). Piping a
            # script fetched from a moving ref into `sudo bash` is a supply-chain
            # risk; the SHA freezes the script and VERSION makes the comment true
            # (without VERSION the script silently installs whatever is latest).
            curl -fLSs https://raw.githubusercontent.com/CircleCI-Public/circleci-cli/07b63e4750438deef3fc0bd2aa10a5eda1d12026/install.sh \
              | sudo VERSION=0.1.34950 bash
            circleci version
      - run:
          name: Pack orb source
          command: circleci orb pack orb/src > /tmp/orb.yml
      - run:
          name: Validate orb
          command: circleci orb validate --org-id efc130dc-284f-4533-964e-844f5c173860 /tmp/orb.yml

  publish-orb:
    parameters:
      pub_type:
        type: enum
        enum: [dev, prod]
        description: "dev = SHA-labelled dev publish; prod = semver release publish."
    executor: base
    steps:
      - checkout
      - run:
          name: Install CircleCI CLI (pinned v0.1.34950)
          command: |
            # Pin BOTH the installer script (to a commit SHA, not the floating
            # `main` ref) and the CLI version it installs (via VERSION). Piping a
            # script fetched from a moving ref into `sudo bash` is a supply-chain
            # risk; the SHA freezes the script and VERSION makes the comment true
            # (without VERSION the script silently installs whatever is latest).
            curl -fLSs https://raw.githubusercontent.com/CircleCI-Public/circleci-cli/07b63e4750438deef3fc0bd2aa10a5eda1d12026/install.sh \
              | sudo VERSION=0.1.34950 bash
            circleci version
      - run:
          name: Pack orb source
          command: circleci orb pack orb/src > /tmp/orb.yml
      - run:
          name: Validate orb
          command: circleci orb validate --org-id efc130dc-284f-4533-964e-844f5c173860 /tmp/orb.yml
      - when:
          condition:
            equal: [dev, << parameters.pub_type >>]
          steps:
            - run:
                name: Publish dev orb (SHA label)
                command: |
                  circleci orb publish /tmp/orb.yml \
                    awesomecicd/circleci-org-migration@dev:${CIRCLE_SHA1:0:7} \
                    --token "$CIRCLE_TOKEN"
      - when:
          condition:
            equal: [prod, << parameters.pub_type >>]
          steps:
            - run:
                name: Publish production orb (semver from tag)
                command: |
                  # Strip leading 'v' from the tag (e.g. v1.2.3 → 1.2.3).
                  semver="${CIRCLE_TAG#v}"
                  circleci orb publish /tmp/orb.yml \
                    awesomecicd/circleci-org-migration@${semver} \
                    --token "$CIRCLE_TOKEN"

workflows:
  # ---------------------------------------------------------------------------
  # release-please — fires on pushes to main ONLY (never on tags, never on PRs).
  # Opens/updates the release PR and cuts the GitHub Release when the release PR
  # is merged.  The resulting tag push fires the `release` and
  # `orb-publish-prod` workflows below.
  # ---------------------------------------------------------------------------
  release-please:
    jobs:
      - release-please:
          context:
            - goreleaser
          filters:
            branches:
              only: main
            tags:
              ignore: /.*/

  ci:
    jobs:
      # -----------------------------------------------------------------------
      # Wave A: build matrix + lint + coverage — all run in parallel, no prerequisites.
      # A compile/lint/coverage failure short-circuits before the heavy
      # test/security jobs start (fail-fast).
      # -----------------------------------------------------------------------
      # Every ci job carries `tags: ignore: /.*/` so the whole ci workflow is
      # branch-only and never fires on a tag push (only the `release` and
      # `orb-publish-prod` workflows should run on tags). This setup pipeline
      # runs the continuation on tags (config.yml uses `tags: only: /.*/` so the
      # release/orb workflows can fire), so without these per-job tag-ignore
      # filters the ci jobs would also execute on tags — wasting credits and
      # showing confusing CI status on releases.
      - build:
          name: "Build: << matrix.goos >>/<< matrix.goarch >>"
          matrix:
            parameters:
              goos: [linux, darwin]
              goarch: [amd64, arm64]
          filters:
            tags:
              ignore: /.*/

      - lint:
          name: Lint
          filters:
            tags:
              ignore: /.*/

      - coverage:
          name: "Coverage (85% gate)"
          filters:
            tags:
              ignore: /.*/

      # -----------------------------------------------------------------------
      # Wave B: test + security — require ALL Wave A jobs to pass first.
      # A test/security failure short-circuits before e2e starts (fail-fast).
      # -----------------------------------------------------------------------
      - test:
          name: "Unit Tests (race)"
          requires:
            - "Build: linux/amd64"
            - "Build: linux/arm64"
            - "Build: darwin/amd64"
            - "Build: darwin/arm64"
            - Lint
            - "Coverage (85% gate)"
          filters:
            tags:
              ignore: /.*/

      - security-vuln:
          name: "Security: govulncheck"
          requires:
            - "Build: linux/amd64"
            - "Build: linux/arm64"
            - "Build: darwin/amd64"
            - "Build: darwin/arm64"
            - Lint
            - "Coverage (85% gate)"
          filters:
            tags:
              ignore: /.*/

      - security-sast:
          name: "Security: gosec (SAST)"
          requires:
            - "Build: linux/amd64"
            - "Build: linux/arm64"
            - "Build: darwin/amd64"
            - "Build: darwin/arm64"
            - Lint
            - "Coverage (85% gate)"
          filters:
            tags:
              ignore: /.*/

      - security-secrets:
          name: "Security: gitleaks"
          requires:
            - "Build: linux/amd64"
            - "Build: linux/arm64"
            - "Build: darwin/amd64"
            - "Build: darwin/arm64"
            - Lint
            - "Coverage (85% gate)"
          filters:
            tags:
              ignore: /.*/

      - security-trivy:
          name: "Security: Trivy"
          requires:
            - "Build: linux/amd64"
            - "Build: linux/arm64"
            - "Build: darwin/amd64"
            - "Build: darwin/arm64"
            - Lint
            - "Coverage (85% gate)"
          filters:
            tags:
              ignore: /.*/

      # -----------------------------------------------------------------------
      # Wave C: e2e — requires ALL Wave B jobs.
      # Uses the linux/amd64 binary persisted to workspace by the build matrix.
      # The workspace is available because build (Wave A) is a transitive
      # prerequisite via Wave B → Wave A.
      # -----------------------------------------------------------------------
      - e2e:
          name: "E2E Smoke (built binary)"
          requires:
            - "Unit Tests (race)"
            - "Security: govulncheck"
            - "Security: gosec (SAST)"
            - "Security: gitleaks"
            - "Security: Trivy"
          filters:
            tags:
              ignore: /.*/

      - terraform-validate:
          name: "Terraform: generate + validate"
          requires:
            - "Unit Tests (race)"
            - "Security: govulncheck"
            - "Security: gosec (SAST)"
            - "Security: gitleaks"
            - "Security: Trivy"
          filters:
            tags:
              ignore: /.*/

  # ---------------------------------------------------------------------------
  # Release workflow — fires ONLY on version tags (v*), never on branches.
  # CircleCI does not run workflows on tags by default; the tag filter below
  # is the explicit opt-in. The existing ci workflow has no tag filters, so it
  # remains branch-only and will NOT fire on tag pushes.
  #
  # Prerequisites:
  #   - A CircleCI context named "goreleaser" must exist in your org, containing
  #     a GITHUB_TOKEN env var with "repo" scope (to create GitHub Releases and
  #     upload release assets).
  # ---------------------------------------------------------------------------
  release:
    jobs:
      - release:
          context:
            - goreleaser
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      # -----------------------------------------------------------------------
      # Post-release smoke test — runs after GoReleaser uploads release assets.
      # Exercises the linux/amd64 and linux/arm64 tarballs in parallel:
      # downloads the real published asset, extracts it, and verifies
      # `version`, `--help`, `secrets merge`, and the README install snippet.
      # -----------------------------------------------------------------------
      - release-smoke:
          name: "Release Smoke: << matrix.platform >>"
          matrix:
            parameters:
              platform: [linux_amd64, linux_arm64]
          requires:
            - release
          context:
            - goreleaser
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

  # ---------------------------------------------------------------------------
  # Orb-publish (dev) — fires on branches ONLY when orb/ changed.
  # The workflow-level when: gates it on the run-orb-publish parameter that
  # path-filtering sets to true. This is the correct v2.1 pattern for
  # parameter-conditioned workflows; job-level when: is not supported.
  # ---------------------------------------------------------------------------
  orb-publish-dev:
    when: << pipeline.parameters.run-orb-publish >>
    jobs:
      # --- Orb test gate (run BEFORE publish) -------------------------------
      # lint (orb-tools), validate (our pack+validate), and shellcheck must all
      # pass before the dev orb is published. A failure here blocks publish.
      - orb-tools/lint:
          name: orb-lint-dev
          source_dir: orb/src
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
      - orb-validate:
          name: orb-validate-dev
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
      - shellcheck/check:
          name: orb-shellcheck-dev
          dir: orb/src/scripts
          exclude: SC2148,SC2086,SC2016,SC2002
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
      # --- Orb review (RC010/RC011 gate) ----------------------------------------
      # Re-enabled after fixing RC010 (snake_case) and RC011 (example versions).
      # orb-tools/review must pass before publish.
      - orb-tools/review:
          name: orb-review-dev
          source_dir: orb/src
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
      # --- Dev publish (requires the test gate) -----------------------------
      # Runs only on branch pipelines (not tags) — enforced by the tag ignore
      # filter so a tag push never triggers a redundant dev publish.
      - publish-orb:
          name: publish-orb-dev
          pub_type: dev
          requires:
            - orb-lint-dev
            - orb-validate-dev
            - orb-shellcheck-dev
            - orb-review-dev
          context:
            - orb-publishing
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/

  # ---------------------------------------------------------------------------
  # Orb-publish (production) — fires on every version tag push.
  # A tag push IS the release signal; no file-change gating needed here.
  # ---------------------------------------------------------------------------
  orb-publish-prod:
    jobs:
      # --- Orb test gate (run BEFORE publish, tag-only) ---------------------
      # Same lint + validate + shellcheck gate as the dev workflow. All must
      # pass before the production (semver) orb is published. Each carries the
      # version-tag filter so these jobs only run on a release tag push.
      - orb-tools/lint:
          name: orb-lint-prod
          source_dir: orb/src
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
            branches:
              ignore: /.*/
      - orb-validate:
          name: orb-validate-prod
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
            branches:
              ignore: /.*/
      - shellcheck/check:
          name: orb-shellcheck-prod
          dir: orb/src/scripts
          exclude: SC2148,SC2086,SC2016,SC2002
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
            branches:
              ignore: /.*/
      # --- Orb review (RC010/RC011 gate) ----------------------------------------
      # Re-enabled after fixing RC010 (snake_case) and RC011 (example versions).
      # orb-tools/review must pass before publish.
      - orb-tools/review:
          name: orb-review-prod
          source_dir: orb/src
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
            branches:
              ignore: /.*/
      # --- Production publish (requires the test gate) ----------------------
      # Production publish: semver release from the tag name.
      - publish-orb:
          name: publish-orb-prod
          pub_type: prod
          requires:
            - orb-lint-prod
            - orb-validate-prod
            - orb-shellcheck-prod
            - orb-review-prod
          context:
            - orb-publishing
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
            branches:
              ignore: /.*/
