version: 2.1

description: |
  Capture CircleCI secret VALUES from inside a pipeline, for org-to-org
  migration with circleci-migrate.

  CircleCI's API masks environment-variable values, so `circleci-migrate export`
  captures only their names. This orb runs `circleci-migrate secrets extract`
  inside a job — where a context's (or project's) variables are injected as real
  environment variables — to capture the values into a bundle, then merges the
  per-context bundles into a single `secrets.json` artifact.

  Run one extract job PER CONTEXT (each referencing exactly that context, so its
  variables are injected without colliding with other contexts), then a merge
  job to combine them.

display:
  home_url: https://circleci.com/docs/
  source_url: https://github.com/CircleCI-Public/circleci-org-migration-cli

executors:
  default:
    docker:
      - image: cimg/base:current
    resource_class: small

commands:
  install:
    description: Install the circleci-migrate CLI from GitHub releases.
    parameters:
      version:
        type: string
        default: latest
        description: Release tag to install (e.g. v1.0.0), or "latest".
      install-dir:
        type: string
        default: /usr/local/bin
    steps:
      - run:
          name: Install circleci-migrate
          command: |
            set -e
            os=$(uname -s | tr '[:upper:]' '[:lower:]')
            arch=$(uname -m); case "$arch" in x86_64) arch=amd64 ;; aarch64|arm64) arch=arm64 ;; esac
            ver="<< parameters.version >>"
            repo="CircleCI-Public/circleci-org-migration-cli"
            if [ "$ver" = "latest" ]; then
              ver=$(curl -sfL "https://api.github.com/repos/${repo}/releases/latest" \
                | grep -o '"tag_name": *"[^"]*"' | head -1 | sed 's/.*"\(v[^"]*\)".*/\1/')
            fi
            v=${ver#v}
            url="https://github.com/${repo}/releases/download/${ver}/circleci-migrate_${v}_${os}_${arch}.tar.gz"
            echo "Downloading ${url}"
            tmp=$(mktemp -d)
            curl -sfL "$url" | tar -xz -C "$tmp"
            bin=$(find "$tmp" -type f -name circleci-migrate | head -1)
            sudo install -m 0755 "$bin" "<< parameters.install-dir >>/circleci-migrate"
            circleci-migrate version

  extract-context:
    description: |
      Capture one context's secret values. The invoking job MUST reference that
      context (via the workflow `context:` key) so its variables are injected.
    parameters:
      manifest:
        type: string
        default: manifest.json
      context-name:
        type: string
        description: The context name (must match the manifest).
      output:
        type: string
        default: secrets.json
    steps:
      - run:
          name: Extract secrets for context << parameters.context-name >>
          command: |
            circleci-migrate secrets extract \
              --manifest "<< parameters.manifest >>" \
              --context "<< parameters.context-name >>" \
              --output "<< parameters.output >>"

  extract-project:
    description: |
      Capture one project's secret values. The invoking job MUST run within that
      project so its variables are injected.
    parameters:
      manifest:
        type: string
        default: manifest.json
      project-slug:
        type: string
      output:
        type: string
        default: secrets.json
    steps:
      - run:
          name: Extract secrets for project << parameters.project-slug >>
          command: |
            circleci-migrate secrets extract \
              --manifest "<< parameters.manifest >>" \
              --project "<< parameters.project-slug >>" \
              --output "<< parameters.output >>"

jobs:
  extract-context:
    description: |
      Checkout, install the CLI, capture one context's secrets, and persist the
      bundle to the workspace (and as an artifact). Invoke once per context with
      the workflow `context:` key set to that context.
    parameters:
      version:
        type: string
        default: latest
      manifest:
        type: string
        default: manifest.json
      context-name:
        type: string
    executor: default
    steps:
      - checkout
      - install:
          version: << parameters.version >>
      - extract-context:
          manifest: << parameters.manifest >>
          context-name: << parameters.context-name >>
          output: secrets-context-<< parameters.context-name >>.json
      - persist_to_workspace:
          root: .
          paths:
            - secrets-context-<< parameters.context-name >>.json
      - store_artifacts:
          path: secrets-context-<< parameters.context-name >>.json

  merge:
    description: |
      Combine all per-context/project bundles persisted to the workspace into a
      single secrets.json artifact. Run after the extract jobs (requires them).
    parameters:
      version:
        type: string
        default: latest
    executor: default
    steps:
      - install:
          version: << parameters.version >>
      - attach_workspace:
          at: .
      - run:
          name: Merge secret bundles
          command: circleci-migrate secrets merge -o secrets.json secrets-*.json
      - store_artifacts:
          path: secrets.json

examples:
  capture-context-secrets:
    description: |
      Capture secrets for two contexts (one job each, each referencing its
      context) and merge them into a single secrets.json artifact. Commit your
      exported manifest.json to the repo first.
    usage:
      version: "2.1"
      orbs:
        migrate: circleci-public/circleci-org-migration@1.0.0
      workflows:
        capture-secrets:
          jobs:
            - migrate/extract-context:
                name: extract-deploy-prod
                context-name: deploy-prod
                context:
                  - deploy-prod
            - migrate/extract-context:
                name: extract-shared
                context-name: shared
                context:
                  - shared
            - migrate/merge:
                requires:
                  - extract-deploy-prod
                  - extract-shared
