description: |
  Checkout, install the CLI, capture one project's secrets, and persist the
  bundle to the workspace. The job must run in the target project so its
  environment variables are injected. Per-project bundles are NOT stored as
  artifacts — the merge job produces the single artifact.

  When encrypt_recipient is set bundles are age-encrypted in the job and only
  the ciphertext reaches the workspace. Plaintext secrets never persist in
  CircleCI storage when this parameter is used.
parameters:
  version:
    type: string
    default: latest
    description: circleci-migrate release tag to install, or "latest".
  manifest:
    type: string
    default: manifest.json
    description: Path to the exported manifest file.
  project_slug:
    type: string
    description: The project slug (e.g. gh/my-org/my-repo).
  cache_cli:
    type: boolean
    default: true
    description: Cache the CLI binary between runs.
  cache_key_prefix:
    type: string
    default: v1
    description: Bump to bust the CLI binary cache.
  encrypt_recipient:
    type: string
    default: ""
    description: |
      age or SSH public-key recipient string (ssh-ed25519 / ssh-rsa / age1...).
      When non-empty the output bundle is age-encrypted. The public key is safe
      to embed here. Decrypt locally with 'circleci-migrate secrets decrypt'.
executor: default
steps:
  - checkout
  - install:
      version: <<parameters.version>>
      cache_cli: <<parameters.cache_cli>>
      cache_key_prefix: <<parameters.cache_key_prefix>>
  - extract_project:
      manifest: <<parameters.manifest>>
      project_slug: <<parameters.project_slug>>
      encrypt_recipient: <<parameters.encrypt_recipient>>
  - persist_to_workspace:
      root: .
      paths:
        - captured
