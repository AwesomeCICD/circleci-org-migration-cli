description: |
  The same capture, but fanned out with a matrix: one job stanza expands to
  one job per context name. Each expansion sets its own `context:` key (via
  << matrix.context_name >>), so variables never collide, and `merge` waits
  on the whole matrix using its alias (the invoked job name,
  `extract_context`). This scales cleanly to dozens of contexts — just add
  names to the list. Commit your exported manifest.json to the repo first.
usage:
  version: "2.1"
  orbs:
    migrate: awesomecicd/circleci-org-migration@volatile
  workflows:
    capture-secrets:
      jobs:
        - migrate/extract_context:
            name: extract-<< matrix.context_name >>
            context:
              - << matrix.context_name >>
            matrix:
              parameters:
                context_name:
                  - deploy-prod
                  - shared
                  - build
        - migrate/merge:
            requires:
              - extract_context
