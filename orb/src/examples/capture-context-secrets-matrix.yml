description: |
  The same capture, but fanned out with a matrix: one job stanza expands to
  one job per context name. Each expansion sets its own `context:` key (via
  << matrix.context_name >>), so variables never collide. Because each
  expansion overrides `name`, the matrix MUST declare an explicit `alias`
  (here `extract_contexts`); `merge` then waits on the whole matrix by
  requiring that alias. This scales cleanly to dozens of contexts — just add
  names to the list. Commit your exported manifest.json to the repo first.
usage:
  version: "2.1"
  orbs:
    migrate: awesomecicd/circleci-org-migration@volatile
  workflows:
    capture-secrets:
      jobs:
        - migrate/extract_context:
            name: extract-<< matrix.context_name >>
            context:
              - << matrix.context_name >>
            matrix:
              alias: extract_contexts
              parameters:
                context_name:
                  - deploy-prod
                  - shared
                  - build
        - migrate/merge:
            name: merge-secrets
            requires:
              - extract_contexts
