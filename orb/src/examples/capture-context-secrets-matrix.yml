description: |
  The same capture, but fanned out with a matrix: one job stanza expands to
  one job per context name. Each expansion sets its own `context:` key (via
  << matrix.context-name >>), so variables never collide, and `merge` waits
  on the whole matrix using its alias (the invoked job name,
  `extract-context`). This scales cleanly to dozens of contexts — just add
  names to the list. Commit your exported manifest.json to the repo first.
usage:
  version: "2.1"
  orbs:
    migrate: awesomecicd/circleci-org-migration@1.0.0
  workflows:
    capture-secrets:
      jobs:
        - migrate/extract-context:
            name: extract-<< matrix.context-name >>
            context:
              - << matrix.context-name >>
            matrix:
              parameters:
                context-name:
                  - deploy-prod
                  - shared
                  - build
        - migrate/merge:
            requires:
              - extract-context
