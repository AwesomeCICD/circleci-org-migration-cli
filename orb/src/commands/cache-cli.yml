description: |
  Save the installed circleci-migrate binary to the cache using the exact-match
  version key written by restore-cli. Must be called after restore-cli and after
  the install command have run.
parameters:
  install-dir:
    type: string
    default: /usr/local/bin
    description: Directory where circleci-migrate is installed.
  cache-key-prefix:
    type: string
    default: v1
    description: Must match the prefix used in restore-cli.
steps:
  - save_cache:
      key: <<parameters.cache-key-prefix>>-circleci-migrate-{{ arch }}-{{ checksum "/tmp/.circleci-migrate-version" }}
      paths:
        - <<parameters.install-dir>>/circleci-migrate
