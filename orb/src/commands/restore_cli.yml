description: |
  Resolve the requested circleci-migrate version (writing a version file used as
  the cache-key checksum input), then attempt to restore the binary from cache.
  Pair with the cache_cli command after the install step.
parameters:
  version:
    type: string
    default: latest
    description: Release tag to install (e.g. v1.0.0), or "latest".
  install_dir:
    type: string
    default: /usr/local/bin
    description: Directory where circleci-migrate will be installed.
  cache_key_prefix:
    type: string
    default: v1
    description: Bump this to invalidate all existing caches (e.g. v1 → v2).
steps:
  - run:
      name: Resolve circleci-migrate version for cache key
      environment:
        ORB_PARAM_VERSION: <<parameters.version>>
      command: <<include(scripts/resolve-version.sh)>>
  - restore_cache:
      keys:
        - <<parameters.cache_key_prefix>>-circleci-migrate-{{ arch }}-{{ checksum "/tmp/.circleci-migrate-version" }}
        - <<parameters.cache_key_prefix>>-circleci-migrate-{{ arch }}-
