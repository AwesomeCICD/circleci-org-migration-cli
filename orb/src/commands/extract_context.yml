description: |
  Capture one context's secret values. The invoking job MUST reference that
  context (via the workflow `context:` key) so its variables are injected.
parameters:
  manifest:
    type: string
    default: manifest.json
    description: Path to the exported manifest file.
  context_name:
    type: string
    description: The context name (must match the manifest).
  output:
    type: string
    default: ""
    description: |
      Output path for the secrets bundle. Leave empty (the default) to let the
      script choose a sanitized path under captured/ (e.g.
      captured/secrets-context-<name>.json). Set explicitly only when you need
      a custom destination; the parent directory is created automatically.
steps:
  - run:
      name: Extract secrets for context <<parameters.context_name>>
      environment:
        ORB_PARAM_MANIFEST: <<parameters.manifest>>
        ORB_PARAM_CONTEXT_NAME: <<parameters.context_name>>
        ORB_PARAM_OUTPUT: <<parameters.output>>
      command: <<include(scripts/extract-context.sh)>>
