# GoReleaser v2 configuration for circleci-migrate.
#
# Archive naming MUST match the orb's install command (orb/orb.yml):
#   https://github.com/AwesomeCICD/circleci-org-migration-cli/releases/download/{tag}/
#     circleci-migrate_{version-without-v}_{os}_{arch}.tar.gz
#
# GoReleaser's {{ .Version }} is the tag with the leading `v` stripped, so
#   name_template: 'circleci-migrate_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
# produces e.g. circleci-migrate_1.2.3_linux_amd64.tar.gz — matching exactly.
version: 2

builds:
  - main: .
    binary: circleci-migrate
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - >-
        -s -w
        -X github.com/AwesomeCICD/circleci-org-migration-cli/version.Version={{ .Version }}
        -X github.com/AwesomeCICD/circleci-org-migration-cli/version.Commit={{ .Commit }}

archives:
  - formats:
      - tar.gz
    # CRITICAL: must match orb install URL pattern exactly.
    # Produces: circleci-migrate_{version}_{os}_{arch}.tar.gz
    # e.g. for v1.2.3/linux/amd64: circleci-migrate_1.2.3_linux_amd64.tar.gz
    name_template: 'circleci-migrate_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: 'checksums.txt'

# Software Bill of Materials, one per archive, generated with Syft.
#
# PREREQUISITE: the `syft` binary must be on PATH in the release job. It is NOT
# bundled with GoReleaser — the release CI must install it (see
# .circleci/continue_config.yml release job). Without syft on PATH the release
# step fails, so the wiring is mandatory, not optional.
#
# Produces e.g. circleci-migrate_1.2.3_linux_amd64.tar.gz.sbom.json alongside
# each archive, in CycloneDX JSON.
sboms:
  - id: archive
    artifacts: archive
    documents:
      - '${artifact}.sbom.json'
    args:
      - '$artifact'
      - '--output'
      - 'cyclonedx-json=$document'

# Cosign keyless (OIDC) signing via Sigstore public infrastructure.
#
# CircleCI supports keyless signing — but ONLY with a custom-audience OIDC token.
# The default CIRCLE_OIDC_TOKEN_V2 has aud=<org-id>, which Fulcio rejects with
#   400 "There was an error processing the identity token".
# The fix (per CircleCI-Public/sign-and-publish-examples cosign/blob/sign.sh) is:
#   export SIGSTORE_ID_TOKEN=$(circleci run oidc get --claims '{"aud":"sigstore"}' --root-issuer)
# cosign picks SIGSTORE_ID_TOKEN up automatically. This token is minted in the
# release job's environment BEFORE goreleaser runs (via $BASH_ENV). See
# .circleci/continue_config.yml release job. Fixed in #215.
#
# The .bundle file (Sigstore bundle format) combines the signature + transparency
# log entry in a single portable JSON file, replacing the older .sig + .pem pair.
signs:
  - cmd: cosign
    signature: '${artifact}.bundle'
    artifacts: all
    output: true
    args:
      - sign-blob
      - '--oidc-issuer=https://oidc.circleci.com'
      - '--yes'
      - '--bundle=${artifact}.bundle'
      - '--use-signing-config=false'
      - '${artifact}'

snapshot:
  # version_template is the v2 key (v1 used name_template).
  version_template: '{{ incpatch .Version }}-snapshot'

# ---------------------------------------------------------------------------
# Homebrew tap — publishes Formula/circleci-migrate.rb to AwesomeCICD/homebrew-tap.
# ---------------------------------------------------------------------------
# This worked for v0.4.1–v0.8.0 (goreleaserbot pushed the formula each release);
# it was mistakenly disabled in #201 on a false "tap does not exist" assumption,
# which froze the published formula at 0.8.0. Re-enabled — the tap repo exists
# and the release token can push to it. `skip_upload: auto` still no-ops on
# snapshots/pre-releases so non-release builds never attempt an upload.
brews:
  - name: circleci-migrate
    repository:
      owner: AwesomeCICD # becomes CircleCI-Labs/homebrew-tap on the Labs move
      name: homebrew-tap
      branch: main
    directory: Formula
    homepage: https://github.com/AwesomeCICD/circleci-org-migration-cli
    description: CLI to migrate CircleCI organizations (contexts, projects, secrets) between orgs
    license: MIT
    install: |
      bin.install "circleci-migrate"
    test: |
      system "#{bin}/circleci-migrate version"
    skip_upload: auto

release:
  # Owner and repo are inferred from the remote URL (temp home):
  # github.com/AwesomeCICD/circleci-org-migration-cli
  # (becomes CircleCI-Labs/circleci-org-migration-cli on the Labs move)
  github: {}
  # release-please creates the tag + GitHub release from Conventional Commits;
  # GoReleaser appends the cross-platform binaries + checksums to that release
  # rather than creating its own.
  mode: append

changelog:
  # release-please owns the changelog (generated from Conventional Commits),
  # so GoReleaser does not generate one.
  disable: true
