# GoReleaser v2 configuration for circleci-migrate.
#
# Archive naming MUST match the orb's install command (orb/orb.yml):
#   https://github.com/CircleCI-Public/circleci-org-migration-cli/releases/download/{tag}/
#     circleci-migrate_{version-without-v}_{os}_{arch}.tar.gz
#
# GoReleaser's {{ .Version }} is the tag with the leading `v` stripped, so
#   name_template: 'circleci-migrate_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
# produces e.g. circleci-migrate_1.2.3_linux_amd64.tar.gz — matching exactly.
version: 2

builds:
  - main: .
    binary: circleci-migrate
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - >-
        -s -w
        -X github.com/CircleCI-Public/circleci-org-migration-cli/version.Version={{ .Version }}
        -X github.com/CircleCI-Public/circleci-org-migration-cli/version.Commit={{ .Commit }}

archives:
  - formats:
      - tar.gz
    # CRITICAL: must match orb install URL pattern exactly.
    # Produces: circleci-migrate_{version}_{os}_{arch}.tar.gz
    # e.g. for v1.2.3/linux/amd64: circleci-migrate_1.2.3_linux_amd64.tar.gz
    name_template: 'circleci-migrate_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: 'checksums.txt'

snapshot:
  # version_template is the v2 key (v1 used name_template).
  version_template: '{{ incpatch .Version }}-snapshot'

release:
  # Owner and repo are inferred from the remote URL:
  # github.com/CircleCI-Public/circleci-org-migration-cli
  github: {}

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
